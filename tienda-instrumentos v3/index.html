<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda de Instrumentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="js/script.js"></script>
</head>
<body onload="cargarTabla();">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand"> Tienda de Instrumentos</span>
    </div>
</nav>

<div class="container mt-4">

    <h2>Agregar Instrumento</h2>

    <form id="form-instrumento" class="border p-3 rounded bg-light mb-4">

        <div class="mb-2">
            <label>Código</label>
            <input type="text" id="codigo" class="form-control" placeholder="Ej: INS001">
        </div>
        <div class="mb-2">
            <label>Nombre *</label>
            <input type="text" id="nombre" class="form-control" placeholder="Ej: Guitarra Eléctrica">
        </div>
        <div class="mb-2">
            <label>Marca *</label>
            <input type="text" id="marca" class="form-control" placeholder="Ej: Fender">
        </div>
        <div class="mb-2">
            <label>Precio</label>
            <input type="number" id="precio" class="form-control" placeholder="Precio">
        </div>
        <div class="mb-2">
            <label>Stock</label>
            <input type="number" id="stock" class="form-control" placeholder="Cantidad en stock">
        </div>
        <div class="mb-2">
            <label>Disponible</label>
            <select id="disponible" class="form-control">
                <option value="">Seleccione</option>
                <option value="true">Sí</option>
                <option value="false">No</option>
            </select>
        </div>
        <div class="mb-2">
            <label>Categoría</label>
            <select id="categoria" class="form-control">
                <option value="">Seleccione</option>
                <option>Cuerdas</option>
                <option>Eléctricos</option>
                <option>Viento</option>
                <option>Percusión</option>
                <option>Teclados</option>
                <option>Acústicos</option>
            </select>
        </div>
        <div class="mb-2">
            <label>Proveedor</label>
            <input type="text" id="proveedorNombre" class="form-control" placeholder="Nombre del proveedor">
        </div>
        <div class="mb-3">
            <label>Ciudad proveedor</label>
            <input type="text" id="proveedorCiudad" class="form-control" placeholder="Ciudad">
        </div>

        <input type="button" value="Guardar" id="bt-guardar" class="btn btn-dark" onclick="agregarInstrumento();">
        <input type="button" value="Cancelar edición" id="bt-cancelar" class="btn btn-secondary" style="display:none;" onclick="cancelarEdicion();">

    </form>

    <div class="border p-3 rounded bg-light mb-4">
        <h2 style="margin-bottom:10px;">Valor del Dólar (API)</h2>
        <p id="txt-dolar">Aún no se ha consultado la API.</p>
        <input type="button" value="Consultar Dólar" id="bt-dolar" class="btn btn-dark" onclick="consultarDolar();">
    </div>

    <h2>Lista de Instrumentos</h2>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Marca</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Disponible</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
    </table>


</div>
</body>
</html>
